<article class="news-card" [class.news-card--featured]="article().is_featured">
  <a [routerLink]="['/news', article().id]" class="news-card__image">
    @if (article().image_url) {
      @if (index() === 0) {
        <img
          [src]="article().image_url"
          [alt]="article().title"
          width="800"
          height="450"
          loading="eager"
          fetchpriority="high"
          decoding="async"
        />
      } @else {
        <img
          [src]="article().image_url"
          [alt]="article().title"
          width="800"
          height="450"
          loading="lazy"
          decoding="async"
        />
      }
    }
  </a>
  <div class="news-card__body">
    <div class="news-card__meta">
      <span class="news-card__category">{{ article().category.name }}</span>
      <time [dateTime]="article().published_at">
        {{ article().published_at | date: 'dd MMM yyyy, HH:mm' }}
      </time>
    </div>
    <h2 class="news-card__title">
      <a [routerLink]="['/news', article().id]">{{ article().title }}</a>
    </h2>
    <p class="news-card__summary">{{ article().summary }}</p>
    <div class="news-card__footer">
      <span class="news-card__author">{{ article().author }}</span>
      <span class="news-card__badge" [class.news-card__badge--hidden]="!article().is_featured">
        Featured
      </span>
    </div>
  </div>
</article>
